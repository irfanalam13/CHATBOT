services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]

  api:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT_URL: http://minio:9000
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      qdrant: {condition: service_started}
      minio: {condition: service_started}
    command: >
      sh -c "python scripts/init_db.py && python scripts/seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      qdrant: {condition: service_started}
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info -Q ingestion,default

  flower:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    ports: ["5555:5555"]
    depends_on:
      redis: {condition: service_healthy}
    command: celery -A app.workers.celery_app.celery_app flower --port=5555

volumes:
  pgdata:
  qdrant_data:
  minio_data:
