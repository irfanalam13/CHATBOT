name: CI

on:
  push: {branches: [main]}
  pull_request: {branches: [main]}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: {POSTGRES_USER: chatbot, POSTGRES_PASSWORD: chatbot, POSTGRES_DB: chatbot}
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U chatbot" --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      POSTGRES_HOST: localhost
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret
      ENCRYPTION_KEY: test-encryption-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -r requirements.txt
      - run: ruff check app || true
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=0

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t chatbot-backend:${{ github.sha }} .
